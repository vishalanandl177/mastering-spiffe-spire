apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-spire-rules
  namespace: monitoring
data:
  spire.rules.yaml: |
    groups:
      - name: spire-alerts
        rules:
          - alert: SpireServerDown
            expr: up{job="spire-server"} == 0
            for: 5m
            labels:
              severity: critical
            annotations:
              summary: "SPIRE Server is down"
              description: "SPIRE Server has been unreachable for more than 5 minutes."

          - alert: SpireAgentDisconnected
            expr: spire_server_agent_count < expected_agent_count
            for: 10m
            labels:
              severity: warning
            annotations:
              summary: "SPIRE Agents disconnected"
              description: "Some SPIRE Agents are not connected to the server."

          - alert: SvidRotationStalled
            expr: rate(spire_agent_svid_rotations_total[15m]) == 0
            for: 30m
            labels:
              severity: critical
            annotations:
              summary: "SVID rotation has stopped"
              description: "Workload identities will expire if rotation does not resume."

          - alert: HighAttestationErrors
            expr: rate(spire_agent_attestation_errors_total[5m]) > 0.1
            for: 10m
            labels:
              severity: warning
            annotations:
              summary: "High rate of attestation errors"
              description: "Workloads are failing attestation. Check registration entries."
