apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: spire
type: Opaque
stringData:
  POSTGRES_PASSWORD: spire-pwd-change-me
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: spire
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          envFrom:
            - secretRef: { name: postgres-secret }
          env:
            - name: POSTGRES_USER
              value: spire
            - name: POSTGRES_DB
              value: spire
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata: { name: data }
      spec:
        accessModes: ["ReadWriteOnce"]
        resources: { requests: { storage: 10Gi } }
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: spire
spec:
  selector: { app: postgres }
  ports:
    - port: 5432
