# HA SPIRE Server config — uses PostgreSQL for shared state
server {
    bind_address = "0.0.0.0"
    bind_port = "8081"
    trust_domain = "example.org"
    data_dir = "/run/spire/data"
    log_level = "INFO"
    ca_subject = {
        country = ["US"],
        organization = ["Demo"],
        common_name = "Demo Production Root CA",
    }
    ca_ttl = "24h"
    default_x509_svid_ttl = "1h"
}

plugins {
    DataStore "sql" {
        plugin_data {
            database_type = "postgres"
            connection_string = "postgresql://spire:spire@postgres.spire.svc.cluster.local/spire?sslmode=require"
        }
    }

    KeyManager "aws_kms" {
        plugin_data {
            region = "us-east-1"
            key_metadata_file = "/run/spire/data/keymetadata"
        }
    }

    NodeAttestor "k8s_psat" {
        plugin_data {
            clusters = {
                "production" = {
                    service_account_allow_list = ["spire:spire-agent"]
                }
            }
        }
    }

    UpstreamAuthority "disk" {
        plugin_data {
            cert_file_path = "/run/spire/data/upstream-cert.pem"
            key_file_path = "/run/spire/data/upstream-key.pem"
        }
    }
}
