name: Deploy with SPIFFE Identity

on:
  push:
    branches: [main]

permissions:
  id-token: write    # Needed for GitHub OIDC
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Get GitHub OIDC token
      - name: Get OIDC token
        id: oidc
        uses: actions/github-script@v7
        with:
          script: |
            const token = await core.getIDToken('spire-server');
            core.setOutput('token', token);

      # Exchange GitHub OIDC for SPIRE SVID
      - name: Get SPIRE SVID
        run: |
          curl -X POST https://spire-server.example.org:8443/exchange \
            -H "Content-Type: application/json" \
            -d '{
              "github_token": "${{ steps.oidc.outputs.token }}",
              "audience": "deploy"
            }' > svid.json

      # Use SVID to authenticate to production cluster
      - name: Deploy to Kubernetes
        run: |
          # SVID is the only credential — no kubeconfig with secret tokens!
          kubectl --certificate-authority=$(jq -r .bundle svid.json) \
            --client-certificate=$(jq -r .cert svid.json) \
            --client-key=$(jq -r .key svid.json) \
            apply -f k8s/

# Result: NO long-lived secrets in GitHub
# Identity is ephemeral, scoped to this specific workflow run
# Audit log shows exactly which workflow accessed production
