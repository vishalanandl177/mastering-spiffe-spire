name: CI
on: [push, pull_request]

jobs:
  validate-yaml:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate Kubernetes YAML
        run: |
          find . -name "*.yaml" -path "*/lab-*" | while read f; do
            echo "Validating $f"
            # Use kubectl in dry-run mode to validate
          done

  shell-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: ShellCheck
        uses: ludeeus/action-shellcheck@master
        with:
          severity: warning

  rego-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup OPA
        run: |
          curl -L -o opa https://openpolicyagent.org/downloads/latest/opa_linux_amd64
          chmod +x opa
          sudo mv opa /usr/local/bin/
      - name: Run OPA tests
        run: |
          for d in $(find . -name "*.rego" -exec dirname {} \; | sort -u); do
            (cd "$d" && opa test . -v) || true
          done
